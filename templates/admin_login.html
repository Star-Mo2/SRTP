{% extends "base.html" %}
{% block title %}管理员登录 - 适老化设施维护优先级评估系统{% endblock %}

{% block content %}
<div class="login-container">
    <div class="card">
        <div class="card-header" style="text-align:center;">
            <span class="card-icon">🔐</span> 管理员登录
        </div>
        <form id="login-form">
            <div class="form-group">
                <label class="form-label">管理员密码</label>
                <input type="password" class="form-input" id="password" placeholder="请输入管理员密码" autofocus>
            </div>
            <button type="submit" class="btn btn-primary btn-lg" style="width:100%;">登录</button>
            <p id="login-error" style="color:var(--danger);font-size:13px;margin-top:10px;display:none;"></p>
        </form>
        <p style="text-align:center;font-size:12px;color:var(--text-muted);margin-top:16px;">
            默认密码：admin123（请及时修改）
        </p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const password = document.getElementById('password').value;
    const errEl = document.getElementById('login-error');
    try {
        const resp = await fetch('/api/admin/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ password }),
        });
        const data = await resp.json();
        if (data.success) {
            window.location.href = '/admin';
        } else {
            errEl.textContent = data.error || '密码错误';
            errEl.style.display = '';
        }
    } catch (err) {
        errEl.textContent = '网络错误';
        errEl.style.display = '';
    }
});
</script>
{% endblock %}
